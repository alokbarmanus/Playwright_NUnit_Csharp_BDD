name: .NET Build and Test (Edge, Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Playwright Browsers
        run: |
            dotnet build --no-restore --configuration Release
            pwsh -File bin/Debug/net8.0/playwright.ps1 install

      - name: Run Playwright regression tests (Edge, dev env)
        env:
          BROWSER: msedge
          ENV: dev
        run: |
          dotnet test --configuration Release --filter "Category=regression" --logger "trx;LogFileName=TestResults.trx"
      - name: Generate LivingDoc report
        run: livingdoc feature-folder Features