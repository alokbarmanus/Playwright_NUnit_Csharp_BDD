name: .NET Build and Test (Edge, Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore


      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright Browsers
        run: pwsh -File $(find bin/Release -name 'playwright.ps1' | head -n 1) install

      - name: Run Playwright regression tests (Edge, dev env)
        env:
          BROWSER: msedge
          ENV: dev
        run: |
          dotnet test --configuration Release --filter "Category=regression" --logger "trx;LogFileName=TestResults.trx"
      - name: Install LivingDoc CLI
        run: dotnet tool install --global SpecFlow.Plus.LivingDoc.CLI

      - name: Add dotnet tools to PATH
        run: echo "${HOME}/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate LivingDoc report
        run: livingdoc feature-folder Features